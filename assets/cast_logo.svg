<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="castGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5A8F00"/>
      <stop offset="55%"  stop-color="#76B900"/>
      <stop offset="100%" stop-color="#008564"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#76B900"/>
      <stop offset="100%" stop-color="#5A8F00"/>
    </linearGradient>
  </defs>

  <!-- CAST monogram: three concentric rings representing the 3-stage pipeline -->
  <g transform="translate(80, 80)">
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.95"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.45"/>
    <!-- C letterform -->
    <path d="M -10 -28 A 28 28 0 1 0 -10 28"
          fill="none" stroke="#5A8F00" stroke-width="6" stroke-linecap="round"/>
    <!-- Anchor pixel -->
    <circle cx="0" cy="0" r="3" fill="#5A8F00"/>
  </g>

  <!-- CAST wordmark only (no subtitle) -->
  <text x="180" y="105" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="800" fill="url(#castGrad)" letter-spacing="3">CAST</text>
</svg>
